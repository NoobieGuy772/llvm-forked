name: Super-Trimmed LLVM Engine + Cross-Sysroots

on:
  workflow_dispatch:

jobs:
  build:
    name: Build LLVM on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # 1. Install Dependencies
      - name: Install Dependencies
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt update && sudo apt install -y ninja-build cmake build-essential ccache zip mingw-w64
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install cmake ninja ccache
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            choco install -y cmake ninja ccache zip
          fi

      # 2. Setup Caching
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ~/.ccache
            ~/AppData/Local/ccache
          key: ${{ runner.os }}-llvm-no-wasm-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-llvm-no-wasm-

      # 3. Prepare Sysroots
      - name: Build Linux musl sysroot
        if: runner.os == 'Linux'
        run: |
          git clone --depth=1 https://github.com/ifduyue/musl
          cd musl && ./configure --prefix=$PWD/../sysroot-linux
          make -j$(nproc) && make install

      - name: Prepare Windows MinGW sysroot
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $PathsToTry = @("C:\mingw64", "C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64", "C:\tools\mingw64")
          foreach ($path in $PathsToTry) {
              if (Test-Path "$path\bin") {
                  mkdir sysroot-windows -Force
                  xcopy /E /I /H /Y "$path\*" "sysroot-windows\"
                  break
              }
          }

      - name: Prepare macOS SDK sysroot
        if: runner.os == 'macOS'
        run: |
          SDK_PATH=$(xcrun --show-sdk-path)
          mkdir -p sysroot-macos
          rsync -a --copy-links --exclude='*.swiftmodule' "$SDK_PATH/" sysroot-macos/ || true

      # 4. Clone & Build LLVM (X86 and AArch64 only)
      - name: Build LLVM Engine
        shell: bash
        run: |
          git clone --depth=1 https://github.com/llvm/llvm-project.git
          mkdir -p build && cd build
          cmake -G Ninja ../llvm-project/llvm \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="X86;AArch64" \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLVM_BUILD_LLVM_DYLIB=OFF \
            -DLLVM_LINK_LLVM_DYLIB=OFF \
            -DLLVM_ENABLE_RTTI=ON \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_UTILS=OFF \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_INSTALL_PREFIX=../install
          ninja install

      # 5. Smart Packaging (Prevents "No such file" errors)
      - name: Package
        shell: bash
        run: |
          mkdir -p pkg/llvm/bin pkg/llvm/lib

          # Selective copy to avoid broken symlinks and bloat
          # We only grab the necessary drivers
          cd install/bin
          for tool in clang clang++ lld ld.lld llc opt llvm-config; do
            # Use -a to preserve links and attributes safely
            cp -a ${tool}* ../../pkg/llvm/bin/ 2>/dev/null || true
          done
          cd ../..

          # Copy clang internal headers (required for compilation)
          cp -r install/lib/clang pkg/llvm/lib/ 2>/dev/null || true
          cp -r install/include pkg/llvm/ 2>/dev/null || true

          # Strip binaries to minimize size
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            find pkg/llvm/bin -type f -exec strip {} + || true
          else
            find pkg/llvm -name "*.pdb" -delete
            find pkg/llvm -name "*.exp" -delete
          fi

          # Add Sysroots
          [ -d sysroot-linux ] && cp -r sysroot-linux pkg/
          [ -d sysroot-windows ] && cp -r sysroot-windows pkg/
          [ -d sysroot-macos ] && cp -r sysroot-macos pkg/

          zip -r llvm-cross-engine-${{ matrix.os }}.zip pkg/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llvm-engine-${{ matrix.os }}
          path: llvm-cross-engine-${{ matrix.os }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./release-files
          merge-multiple: true

      - name: Create Auto-Incremented Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release list --limit 1 | awk '{print $1}')
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="llvm1"
          else
            NUMBER=$(echo $LATEST_TAG | sed 's/[^0-9]*//g')
            [ -z "$NUMBER" ] && NUMBER=0
            NEW_NUMBER=$((NUMBER + 1))
            NEW_TAG="llvm$NEW_NUMBER"
          fi
          
          gh release create "$NEW_TAG" ./release-files/*.zip \
            --title "LLVM Engine Trimmed ($NEW_TAG)" \
            --notes "Statically linked MinSizeRel build with X86, AArch64, and Cross-Sysroots."
